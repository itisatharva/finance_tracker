name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      actions: read
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate firebase-config.js from secrets
        env:
          API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
        run: |
          python3 << 'PYEOF'
          import os

          api_key             = os.environ['API_KEY']
          auth_domain         = os.environ['AUTH_DOMAIN']
          project_id          = os.environ['PROJECT_ID']
          storage_bucket      = os.environ['STORAGE_BUCKET']
          messaging_sender_id = os.environ['MESSAGING_SENDER_ID']
          app_id              = os.environ['APP_ID']
          measurement_id      = os.environ['MEASUREMENT_ID']

          content = (
            "import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';\n"
            "import {\n"
            "  getAuth, onAuthStateChanged,\n"
            "  signInWithEmailAndPassword, createUserWithEmailAndPassword,\n"
            "  signInWithPopup, signInWithRedirect, getRedirectResult,\n"
            "  GoogleAuthProvider, signOut as fbSignOut, getAdditionalUserInfo,\n"
            "  sendPasswordResetEmail, reauthenticateWithCredential,\n"
            "  updatePassword, EmailAuthProvider\n"
            "} from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';\n"
            "import {\n"
            "  initializeFirestore, persistentLocalCache, persistentMultipleTabManager,\n"
            "  collection, doc, getDoc, setDoc, addDoc, deleteDoc,\n"
            "  query, orderBy, onSnapshot, serverTimestamp, writeBatch\n"
            "} from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';\n"
            "\n"
            "const firebaseConfig = {\n"
            f"  apiKey:            '{api_key}',\n"
            f"  authDomain:        '{auth_domain}',\n"
            f"  projectId:         '{project_id}',\n"
            f"  storageBucket:     '{storage_bucket}',\n"
            f"  messagingSenderId: '{messaging_sender_id}',\n"
            f"  appId:             '{app_id}',\n"
            f"  measurementId:     '{measurement_id}'\n"
            "};\n"
            "\n"
            "const app  = initializeApp(firebaseConfig);\n"
            "const auth = getAuth(app);\n"
            "\n"
            "// Firestore with offline persistence.\n"
            "// Writes made while offline are queued in IndexedDB and\n"
            "// auto-synced the moment the user comes back online.\n"
            "const db = initializeFirestore(app, {\n"
            "  localCache: persistentLocalCache({\n"
            "    tabManager: persistentMultipleTabManager()\n"
            "  })\n"
            "});\n"
            "\n"
            "window.auth = auth;\n"
            "window.db   = db;\n"
            "window.onAuthStateChanged             = onAuthStateChanged;\n"
            "window.signInWithEmailAndPassword     = signInWithEmailAndPassword;\n"
            "window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;\n"
            "window.signInWithPopup                = signInWithPopup;\n"
            "window.signInWithRedirect             = signInWithRedirect;\n"
            "window.getRedirectResult              = getRedirectResult;\n"
            "window.GoogleAuthProvider             = GoogleAuthProvider;\n"
            "window.getAdditionalUserInfo          = getAdditionalUserInfo;\n"
            "window.fbSignOut                      = fbSignOut;\n"
            "window.signOutFirebase                = fbSignOut;\n"
            "window.sendPasswordResetEmail         = sendPasswordResetEmail;\n"
            "window.reauthenticateWithCredential   = reauthenticateWithCredential;\n"
            "window.updatePassword                 = updatePassword;\n"
            "window.EmailAuthProvider              = EmailAuthProvider;\n"
            "window.collection    = collection;   window.doc         = doc;\n"
            "window.getDoc        = getDoc;       window.setDoc      = setDoc;\n"
            "window.addDoc        = addDoc;       window.deleteDoc   = deleteDoc;\n"
            "window.query         = query;        window.orderBy     = orderBy;\n"
            "window.onSnapshot    = onSnapshot;   window.serverTimestamp = serverTimestamp;\n"
            "window.writeBatch    = writeBatch;\n"
            "window.firebaseReady = Promise.resolve();\n"
            "window._authHandled  = false;\n"
            "\n"
            "const _path         = window.location.pathname;\n"
            "const onLandingPage = _path.includes('landing') || _path === '/';\n"
            "const onLoginPage   = _path.includes('login');\n"
            "const onSetupPage   = _path.includes('category-setup');\n"
            "const onAppPage     = !onLandingPage && !onLoginPage && !onSetupPage;\n"
            "\n"
            "onAuthStateChanged(auth, (user) => {\n"
            "  if (window._authHandled) return;\n"
            "  window._authHandled = true;\n"
            "\n"
            "  if (!user) {\n"
            "    if (onAppPage || onSetupPage) {\n"
            "      window.location.replace('landing.html');\n"
            "      return;\n"
            "    }\n"
            "    hideLoader();\n"
            "    return;\n"
            "  }\n"
            "\n"
            "  if (onLoginPage || onLandingPage) {\n"
            "    window.location.replace('index.html');\n"
            "    return;\n"
            "  }\n"
            "  if (onAppPage) {\n"
            "    return;\n"
            "  }\n"
            "  hideLoader();\n"
            "});\n"
            "\n"
            "setTimeout(() => {\n"
            "  if (!window._authHandled) {\n"
            "    window._authHandled = true;\n"
            "    if (onAppPage || onSetupPage) {\n"
            "      window.location.replace('landing.html');\n"
            "    } else {\n"
            "      hideLoader();\n"
            "    }\n"
            "  }\n"
            "}, 5000);\n"
            "\n"
            "function hideLoader() {\n"
            "  const l = document.getElementById('pageLoader');\n"
            "  if (l) { l.style.opacity = '0'; setTimeout(() => l.remove(), 300); }\n"
            "  document.documentElement.classList.remove('page-locked');\n"
            "}\n"
          )

          with open('public/firebase-config.js', 'w') as f:
              f.write(content)

          print('firebase-config.js generated successfully')
          PYEOF

      # ── Stamp the Service Worker cache version ────────────────────────────────
      - name: Stamp Service Worker cache version
        run: |
          BUILD_TS=$(date -u +%Y%m%d%H%M%S)
          sed -i "s/BUILD_TIMESTAMP/${BUILD_TS}/g" public/sw.js
          echo "Stamped SW cache version: ft-shell-${BUILD_TS}"

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: itisatharva-ft