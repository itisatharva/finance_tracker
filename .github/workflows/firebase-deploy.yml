name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate firebase-config.js from secrets
        env:
          API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
        run: |
          node -e "
          const fs = require('fs');
          const content = \`import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
          import {
            getAuth, onAuthStateChanged,
            signInWithEmailAndPassword, createUserWithEmailAndPassword,
            signInWithPopup, signInWithRedirect, getRedirectResult,
            GoogleAuthProvider, signOut as fbSignOut, getAdditionalUserInfo
          } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
          import {
            getFirestore, collection, doc, getDoc, setDoc, addDoc, deleteDoc,
            query, orderBy, onSnapshot, serverTimestamp
          } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

          const firebaseConfig = {
            apiKey:            '\${API_KEY}',
            authDomain:        '\${AUTH_DOMAIN}',
            projectId:         '\${PROJECT_ID}',
            storageBucket:     '\${STORAGE_BUCKET}',
            messagingSenderId: '\${MESSAGING_SENDER_ID}',
            appId:             '\${APP_ID}',
            measurementId:     '\${MEASUREMENT_ID}'
          };

          const app  = initializeApp(firebaseConfig);
          const auth = getAuth(app);
          const db   = getFirestore(app);

          window.auth = auth;
          window.db   = db;
          window.onAuthStateChanged             = onAuthStateChanged;
          window.signInWithEmailAndPassword     = signInWithEmailAndPassword;
          window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
          window.signInWithPopup                = signInWithPopup;
          window.signInWithRedirect             = signInWithRedirect;
          window.getRedirectResult              = getRedirectResult;
          window.GoogleAuthProvider             = GoogleAuthProvider;
          window.getAdditionalUserInfo          = getAdditionalUserInfo;
          window.fbSignOut                      = fbSignOut;
          window.signOutFirebase                = fbSignOut;
          window.collection    = collection;   window.doc         = doc;
          window.getDoc        = getDoc;       window.setDoc      = setDoc;
          window.addDoc        = addDoc;       window.deleteDoc   = deleteDoc;
          window.query         = query;        window.orderBy     = orderBy;
          window.onSnapshot    = onSnapshot;   window.serverTimestamp = serverTimestamp;
          window.firebaseReady = Promise.resolve();
          window._authHandled  = false;
          window._redirectHandled = false;

          const _path       = window.location.pathname;
          const onLoginPage = _path.includes('login');
          const onSetupPage = _path.includes('category-setup');
          const onAppPage   = !onLoginPage && !onSetupPage;

          // ── Mobile Google redirect handling ──────────────────────────────────
          // On mobile, signInWithRedirect is used. After Google redirects back to
          // login.html, getRedirectResult() is the ONLY reliable way to detect a
          // new-vs-returning user. We must call it immediately on page load —
          // before onAuthStateChanged fires — so we can route correctly.
          // ────────────────────────────────────────────────────────────────────
          const redirectCheckDone = onLoginPage
            ? getRedirectResult(auth)
                .then(result => {
                  if (result && result.user) {
                    window._redirectHandled = true;
                    window._authHandled     = true;
                    const isNew = getAdditionalUserInfo(result) && getAdditionalUserInfo(result).isNewUser;
                    window.location.replace(isNew ? 'category-setup.html' : 'index.html');
                  }
                  // null result = normal login page load, fall through to onAuthStateChanged
                })
                .catch(err => {
                  console.error('[Auth] getRedirectResult error:', err);
                  // Don't block — let onAuthStateChanged handle the page
                })
            : Promise.resolve();

          redirectCheckDone.then(() => {
            if (window._redirectHandled) return;

            onAuthStateChanged(auth, (user) => {
              if (window._authHandled) return;
              window._authHandled = true;

              if (!user) {
                if (onAppPage || onSetupPage) {
                  window.location.replace('login.html');
                  return;
                }
                hideLoader();
                return;
              }

              // User is logged in
              if (onLoginPage) {
                // Returning user who is already logged in and navigated back to login
                window.location.replace('index.html');
                return;
              }
              if (onAppPage) {
                // Keep loader — app.js will hide it after data loads
                return;
              }
              // onSetupPage or fallback
              hideLoader();
            });

            // Safety net: if auth takes >5s (network issue), unblock the page
            setTimeout(() => {
              if (!window._authHandled) {
                window._authHandled = true;
                if (onAppPage || onSetupPage) {
                  window.location.replace('login.html');
                } else {
                  hideLoader();
                }
              }
            }, 5000);
          });

          function hideLoader() {
            const l = document.getElementById('pageLoader');
            if (l) { l.style.opacity = '0'; setTimeout(() => l.remove(), 300); }
            document.documentElement.classList.remove('page-locked');
          }
          \`;
          fs.writeFileSync('public/firebase-config.js', content);
          console.log('firebase-config.js generated');
          "

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: itisatharva-ft