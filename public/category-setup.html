<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Setup Categories — Finance Tracker</title>
  <script>(function(){ document.documentElement.setAttribute('data-theme', localStorage.getItem('theme')||'light'); })();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=1771054095282" />

<style>@keyframes loader-out{to{opacity:0;pointer-events:none;}}</style>
</head>
<body>

<div id="pageLoader" style="position:fixed;inset:0;background:var(--bg-page);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px;transition:opacity .3s;animation:loader-out 0.4s linear 6s forwards;">
  <div style="width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--ink);border-radius:50%;animation:spin .8s linear infinite;"></div>
  <div style="font-size:.88rem;color:var(--text-3);font-family:'DM Sans',sans-serif;">Loading…</div>
</div>

<style>
  @keyframes spin { to { transform: rotate(360deg); } }
  .setup-page { min-height:100vh; background:var(--bg-page); display:flex; align-items:flex-start; justify-content:center; padding:48px 20px 60px; }
  .setup-card { background:var(--bg-card); border:1.5px solid var(--border); border-radius:var(--r-xl); padding:40px 40px 36px; width:100%; max-width:600px; box-shadow:var(--shadow-md); }
  .setup-header { text-align:center; margin-bottom:36px; }
  .setup-brand { width:52px; height:52px; background:var(--ink); color:var(--ink-fg); border-radius:var(--r-md); font-size:1.5rem; font-weight:700; display:inline-flex; align-items:center; justify-content:center; margin-bottom:16px; }
  .setup-header h1 { font-size:1.5rem; font-weight:700; color:var(--text-1); letter-spacing:-.02em; margin-bottom:6px; }
  .setup-header p { font-size:.9rem; color:var(--text-3); }
  .setup-section { margin-bottom:28px; }
  .setup-section-head { display:flex; align-items:center; gap:8px; margin-bottom:12px; padding-bottom:10px; border-bottom:1.5px solid var(--border); }
  .setup-section-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .setup-section-head h3 { font-size:.75rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--text-3); }
  .setup-cat-list { display:flex; flex-direction:column; gap:8px; margin-bottom:10px; min-height:8px; }
  .setup-add-row { display:flex; gap:8px; align-items:center; margin-top:8px; }
  .setup-add-row input[type="text"] { flex:1; }
  .setup-footer { display:flex; gap:12px; margin-top:32px; padding-top:24px; border-top:1.5px solid var(--border); }
  .setup-footer button { flex:1; }
  @media (max-width:520px) { .setup-card { padding:28px 18px 24px; } }
</style>

<div class="setup-page">
  <div class="setup-card">

    <div class="setup-header">
      <div class="setup-brand">₹</div>
      <h1>Set Up Your Categories</h1>
      <p>Choose what to track. You can always edit these later in Settings.</p>
    </div>

    <div class="setup-section">
      <div class="setup-section-head">
        <div class="setup-section-dot" style="background:var(--red)"></div>
        <h3>Expense Categories</h3>
      </div>
      <div class="setup-cat-list" id="expenseList"></div>
      <div class="setup-add-row">
        <input type="text" id="newExpName" placeholder="New expense category…" />
        <div class="add-cat-color-wrap" title="Pick colour">
          <input type="color" id="newExpColor" value="#E84545"
                 oninput="document.getElementById('newExpSwatch').style.background=this.value" />
          <span class="add-cat-color-swatch" id="newExpSwatch" style="background:#E84545"></span>
        </div>
        <button class="btn btn-secondary" onclick="addCat('expense')">Add</button>
      </div>
    </div>

    <div class="setup-section">
      <div class="setup-section-head">
        <div class="setup-section-dot" style="background:var(--green)"></div>
        <h3>Income Categories</h3>
      </div>
      <div class="setup-cat-list" id="incomeList"></div>
      <div class="setup-add-row">
        <input type="text" id="newIncName" placeholder="New income category…" />
        <div class="add-cat-color-wrap" title="Pick colour">
          <input type="color" id="newIncColor" value="#0FA974"
                 oninput="document.getElementById('newIncSwatch').style.background=this.value" />
          <span class="add-cat-color-swatch" id="newIncSwatch" style="background:#0FA974"></span>
        </div>
        <button class="btn btn-secondary" onclick="addCat('income')">Add</button>
      </div>
    </div>

    <div class="setup-footer">
      <button class="btn btn-secondary" onclick="skipSetup()">Skip for Now</button>
      <button class="btn btn-primary" id="continueBtn" onclick="saveAndContinue()">Continue →</button>
    </div>

  </div>
</div>

<script type="module" src="firebase-config.js?v=1771054095282"></script>
<script type="module" src="category-setup.js?v=1771054095282"></script>
</body>
</html>
