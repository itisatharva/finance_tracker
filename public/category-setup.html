<!DOCTYPE html>
<html lang="en" class="page-locked">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Categories - Finance Tracker</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .setup-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .setup-card {
            background: var(--bg-card);
            padding: 48px;
            border-radius: 24px;
            max-width: 800px;
            width: 100%;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px var(--shadow-lg);
        }

        .setup-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .setup-header h1 {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .setup-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .categories-section {
            margin-bottom: 32px;
        }

        .categories-section h3 {
            font-size: 1.1rem;
            margin-bottom: 16px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .category-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
        }

        .category-pill {
            padding: 10px 18px;
            border-radius: 20px;
            border: 2px solid var(--border);
            background: var(--bg-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            font-weight: 500;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .category-pill:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .category-pill.selected {
            border-width: 2px;
            transform: scale(1.05);
        }

        .category-color-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid rgba(0,0,0,0.1);
        }

        .custom-category {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .custom-category input[type="text"] {
            flex: 1;
        }

        .custom-category input[type="color"] {
            width: 50px;
            height: 44px;
            padding: 4px;
            border-radius: 8px;
            cursor: pointer;
        }

        .custom-category button {
            padding: 12px 20px;
            white-space: nowrap;
        }

        .setup-actions {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        .setup-actions button {
            flex: 1;
        }

        .skip-btn {
            background: transparent;
            color: var(--text-secondary);
            border: 1.5px solid var(--border);
        }

        .skip-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="setup-container">
        <div class="setup-card">
            <div class="setup-header">
                <h1>Setup Your Categories</h1>
                <p>Select categories and customize their colors for better visualization</p>
            </div>

            <!-- Income Categories -->
            <div class="categories-section">
                <h3>
                    <span style="color: var(--income);">💚</span>
                    Income Categories
                </h3>
                <div class="category-pills" id="incomePills"></div>
                <div class="custom-category">
                    <input type="text" id="customIncome" placeholder="Add custom category">
                    <input type="color" id="customIncomeColor" value="#10b981">
                    <button onclick="addCustomCategory('income')" class="btn-secondary">+ Add</button>
                </div>
            </div>

            <!-- Expense Categories -->
            <div class="categories-section">
                <h3>
                    <span style="color: var(--expense);">💸</span>
                    Expense Categories
                </h3>
                <div class="category-pills" id="expensePills"></div>
                <div class="custom-category">
                    <input type="text" id="customExpense" placeholder="Add custom category">
                    <input type="color" id="customExpenseColor" value="#FF6B6B">
                    <button onclick="addCustomCategory('expense')" class="btn-secondary">+ Add</button>
                </div>
            </div>

            <!-- Actions -->
            <div class="setup-actions">
                <button onclick="skipSetup()" class="skip-btn">Skip for Now</button>
                <button onclick="saveCategories()" class="btn-primary">Continue →</button>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="page-loader" id="pageLoader">
        <div>
            <div class="spinner"></div>
            <div class="spinner-text">Saving...</div>
        </div>
    </div>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="category-setup.js"></script>
</body>
</html>
