<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Tracker</title>
  <script>(function(){ document.documentElement.setAttribute('data-theme', localStorage.getItem('theme')||'light'); })();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=1771054095282" />
</head>
<body>

<div class="auth-wrap">

  <!-- SIGN IN CARD -->
  <div class="auth-card" id="cardSignin">
    <div class="auth-brand">₹</div>
    <h1>Welcome back</h1>
    <p class="auth-sub">Sign in to Finance Tracker</p>

    <div class="auth-err" id="signinErr"></div>

    <button class="btn-google" id="signinGoogleBtn" type="button">
      <svg width="18" height="18" viewBox="0 0 18 18" style="flex-shrink:0">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/>
      </svg>
      Continue with Google
    </button>

    <div class="auth-divider"><span>or sign in with email</span></div>

    <form class="auth-form" id="signinForm" novalidate>
      <div class="field">
        <label>Email</label>
        <input type="email" id="siEmail" placeholder="you@email.com" autocomplete="email" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="siPass" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary w-full auth-btn" id="signinBtn">Sign In</button>
    </form>

    <p class="auth-toggle">Don't have an account? <a href="#" id="goToSignup">Join for free →</a></p>
  </div>

  <!-- JOIN CARD -->
  <div class="auth-card auth-slide-out" id="cardSignup">
    <div class="auth-brand">₹</div>
    <h1>Create your account</h1>
    <p class="auth-sub">Join Finance Tracker — it's free</p>

    <div class="auth-err" id="signupErr"></div>

    <button class="btn-google" id="signupGoogleBtn" type="button">
      <svg width="18" height="18" viewBox="0 0 18 18" style="flex-shrink:0">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/>
      </svg>
      Join with Google
    </button>

    <div class="auth-divider"><span>or join with email</span></div>

    <form class="auth-form" id="signupForm" novalidate>
      <div class="field">
        <label>Email</label>
        <input type="email" id="suEmail" placeholder="you@email.com" autocomplete="email" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="suPass" placeholder="Min. 6 characters" autocomplete="new-password" />
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="suPass2" placeholder="Repeat password" autocomplete="new-password" />
      </div>
      <button type="submit" class="btn btn-join w-full auth-btn" id="signupBtn">Join</button>
    </form>

    <p class="auth-toggle">Already have an account? <a href="#" id="goToSignin">← Sign in</a></p>
  </div>

</div>

<script type="module" src="firebase-config.js?v=1771054095282"></script>
<script type="module" src="auth.js?v=1771054095282"></script>
</body>
</html>
